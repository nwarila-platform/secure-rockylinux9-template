name: "Security Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy (Filesystem & Secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Generate Trivy SARIF Report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          scanners: "misconfig,secret"

      - name: Enforce Trivy Policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "HIGH,CRITICAL"
          scanners: "misconfig,secret"
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload Trivy SARIF Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30

  gitleaks:
    name: Gitleaks (Secret Scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # The gitleaks-action wrapper requires a paid GITLEAKS_LICENSE for
      # organization repos; the gitleaks binary itself is free. Run the
      # SHA-pinned binary directly (mirrors the actionlint/packer download
      # pattern in pr-verify.yaml) so the secret scan needs no license.
      - name: Run Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_TAR_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail

          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 --retry-connrefused --connect-timeout 15 \
            "${base_url}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          printf '%s  %s\n' "${GITLEAKS_TAR_SHA256}" /tmp/gitleaks.tar.gz | sha256sum -c -

          rm -rf /tmp/gitleaks-bin
          mkdir -p /tmp/gitleaks-bin
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks-bin
          sudo install -m 0755 /tmp/gitleaks-bin/gitleaks /usr/local/bin/gitleaks

          gitleaks version
          gitleaks dir . --redact --no-banner
