name: "Packer Build (Proxmox)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - packer/systems.auto.pkrvars.hcl
      - packer/**
      - .github/workflows/packer.yaml

permissions:
  contents: read

concurrency:
  group: packer-${{ github.event.repository.name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  packer:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 120
    env:
      # Proxmox Variables
      PKR_VAR_proxmox_hostname:         ${{ secrets.PROXMOX_HOSTNAME }}
      PKR_VAR_proxmox_api_token_id:     ${{ secrets.PROXMOX_PACKER_FRAMEWORK_TOKEN_ID }}
      PKR_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_PACKER_FRAMEWORK_SECRET }}
      PKR_VAR_proxmox_skip_tls_verify:  ${{ vars.PROXMOX_SKIP_TLS_VERIFY || 'false' }}
      PKR_VAR_proxmox_node:             ${{ secrets.PROXMOX_NODE }}

      # Deploy User Variables
      PKR_VAR_deploy_user_name:     ${{ secrets.DEPLOY_USER_NAME }}
      PKR_VAR_deploy_user_password: ${{ secrets.DEPLOY_USER_PASSWORD }}
      PKR_VAR_deploy_user_key:      ${{ secrets.DEPLOY_USER_PUBLIC_KEY }}

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: ${{ github.event.repository.name }}
          persist-credentials: false

      - name: Checkout Packer Framework Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: proxmox-packer-framework
          persist-credentials: false
          ref: 8bf05ff47c844d56695c9d68353f76b46f27f63a
          repository: NWarila/Proxmox-Packer-Framework

      - name: Checkout Ansible Framework Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: ansible-framework
          persist-credentials: false
          ref: e1b52f33d9270b14ba55cdb5810a7a3de0c83b90
          repository: NWarila/ansible-framework

      - name: Perform Prerequisites Validation
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          required_variables=(
            "PKR_VAR_proxmox_hostname"
            "PKR_VAR_proxmox_api_token_id"
            "PKR_VAR_proxmox_api_token_secret"
            "PKR_VAR_deploy_user_name"
            "PKR_VAR_deploy_user_password"
            "PKR_VAR_deploy_user_key"
          )

          for variable_name in "${required_variables[@]}"; do
            variable_value="${!variable_name:-}"
            if [[ -z "${variable_value//[[:space:]]/}" ]]; then
              echo "Required environment variable is not set: ${variable_name}" >&2
              exit 1
            fi
          done

          if ! packer_command="$(command -v packer)"; then
            echo "Required executable not found: packer" >&2
            exit 1
          fi

          if ! ansible_command="$(command -v ansible-playbook)"; then
            echo "Required executable not found: ansible-playbook" >&2
            exit 1
          fi

          echo "Using Packer executable: ${packer_command}"
          echo "Using Ansible executable: ${ansible_command}"

      - name: Copy Consumer Configuration into Packer Framework
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          consumer_dir="${GITHUB_WORKSPACE}/${GITHUB_REPOSITORY##*/}"
          destination_dir="${GITHUB_WORKSPACE}/proxmox-packer-framework/packer"

          if [[ ! -d "${destination_dir}" ]]; then
            echo "Packer working directory not found: ${destination_dir}" >&2
            exit 1
          fi

          # Copy pkrvars configuration
          pkrvars_file="${consumer_dir}/packer/systems.auto.pkrvars.hcl"
          if [[ ! -f "${pkrvars_file}" ]]; then
            echo "Required file not found: ${pkrvars_file}" >&2
            exit 1
          fi
          cp -f "${pkrvars_file}" "${destination_dir}/"

          # Copy kickstart template
          ks_template="${consumer_dir}/packer/ks.pkrtpl.hcl"
          if [[ ! -f "${ks_template}" ]]; then
            echo "Required file not found: ${ks_template}" >&2
            exit 1
          fi
          cp -f "${ks_template}" "${destination_dir}/"

          # Copy Ansible playbook
          ansible_playbook="${consumer_dir}/packer/rocky-linux-9.yml"
          if [[ ! -f "${ansible_playbook}" ]]; then
            echo "Required file not found: ${ansible_playbook}" >&2
            exit 1
          fi
          cp -f "${ansible_playbook}" "${destination_dir}/"

      - name: Packer Init
        shell: bash
        working-directory: ${{ github.workspace }}/proxmox-packer-framework/packer
        run: |
          set -euo pipefail
          /usr/bin/packer init .

      - name: Packer fmt
        shell: bash
        working-directory: ${{ github.workspace }}/proxmox-packer-framework/packer
        run: |
          set -euo pipefail
          /usr/bin/packer fmt -check -diff .

      - name: Packer validate
        shell: bash
        working-directory: ${{ github.workspace }}/proxmox-packer-framework/packer
        run: |
          set -euo pipefail
          /usr/bin/packer validate .

      - name: Packer build
        shell: bash
        working-directory: ${{ github.workspace }}/proxmox-packer-framework/packer
        run: |
          set -euo pipefail
          /usr/bin/packer build -force -timestamp-ui -color=false -on-error=cleanup . | tee packer-build.log

      - name: Upload Packer Build Diagnostics
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: packer-build-diagnostics
          path: |
            ${{ github.workspace }}/proxmox-packer-framework/packer/packer-build.log
            ${{ github.workspace }}/proxmox-packer-framework/packer/manifests
          if-no-files-found: warn
          retention-days: 14
