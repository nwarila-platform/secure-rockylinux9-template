name: Feature Request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - NWarila

body:
  - type: markdown
    attributes:
      value: |
        This repository owns the consumer profile and repo automation.

        Requests for framework-side Packer behavior usually belong in
        `proxmox-packer-framework`.

        Requests for reusable Ansible roles usually belong in `ansible-framework`.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which boundary does this request affect most directly?
      options:
        - Consumer profile values / defaults (this repo)
        - Kickstart / guest baseline (this repo)
        - Bootstrap playbook entrypoint (this repo)
        - Packer framework build logic (`proxmox-packer-framework`)
        - Ansible roles / shared config (`ansible-framework`)
        - CI/CD workflows
        - Developer tooling / pre-commit
        - Documentation / release semantics
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context or screenshots.
