---
# ============================================================================================= #
# Rocky Linux 9 Hardening Playbook                                                             #
#                                                                                               #
# Consumer bootstrap playbook entrypoint for the Proxmox Packer Framework Ansible provisioner. #
# Reusable Rocky Linux 9 roles remain upstream in ansible-framework.                           #
# ============================================================================================= #

- name: Rocky Linux 9 Hardening
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_remote_tmp: /opt/ansible/tmp
    ansible_ssh_transfer_method: sftp
  pre_tasks:
    - name: Capture SSH SFTP state before normalization
      ansible.builtin.raw: |
        echo '=== BEFORE: subsystem lines ==='
        grep -Rin '^[#[:space:]]*Subsystem[[:space:]]\+sftp' /etc/ssh 2>/dev/null || true
        echo '=== BEFORE: sshd -T subsystem ==='
        sshd -T 2>/dev/null | grep '^subsystem' || true
        echo '=== BEFORE: sftp binaries ==='
        ls -l /usr/libexec/openssh/sftp-server /usr/lib/sftp-server 2>&1 || true
        echo '=== BEFORE: ansible tmp path ==='
        ls -ld /opt /opt/ansible /opt/ansible/tmp 2>&1 || true
      register: ssh_sftp_state_before
      changed_when: false

    - name: Print SSH SFTP state before normalization
      ansible.builtin.debug:
        var: ssh_sftp_state_before.stdout_lines

    - name: Normalize SSH SFTP subsystem before fact gathering
      ansible.builtin.raw: |
        set -e
        if [ -d /etc/ssh/sshd_config.d ]; then
          find /etc/ssh/sshd_config.d -maxdepth 1 -type f -name '*.conf' -exec \
            sed -i '/^[#[:space:]]*Subsystem[[:space:]]\+sftp[[:space:]].*/d' {} +
        fi
        sed -i '/^[#[:space:]]*Subsystem[[:space:]]\+sftp[[:space:]].*/d' /etc/ssh/sshd_config
        echo 'Subsystem sftp /usr/libexec/openssh/sftp-server' >> /etc/ssh/sshd_config
        if [ -x /usr/libexec/openssh/sftp-server ] && [ ! -e /usr/lib/sftp-server ]; then
          ln -s /usr/libexec/openssh/sftp-server /usr/lib/sftp-server
        fi
        install -d -m 0700 -o {{ ansible_user }} -g {{ ansible_user }} {{ ansible_remote_tmp }}
        sshd -t
        systemctl reload sshd || systemctl restart sshd
      changed_when: false

    - name: Capture SSH SFTP state after normalization
      ansible.builtin.raw: |
        echo '=== AFTER: subsystem lines ==='
        grep -Rin '^[#[:space:]]*Subsystem[[:space:]]\+sftp' /etc/ssh 2>/dev/null || true
        echo '=== AFTER: sshd -T subsystem ==='
        sshd -T 2>/dev/null | grep '^subsystem' || true
        echo '=== AFTER: sftp binaries ==='
        ls -l /usr/libexec/openssh/sftp-server /usr/lib/sftp-server 2>&1 || true
        echo '=== AFTER: ansible tmp path ==='
        ls -ld /opt /opt/ansible /opt/ansible/tmp 2>&1 || true
      register: ssh_sftp_state_after
      changed_when: false

    - name: Print SSH SFTP state after normalization
      ansible.builtin.debug:
        var: ssh_sftp_state_after.stdout_lines

    - name: Reset SSH connection after normalizing the SFTP subsystem
      ansible.builtin.meta: reset_connection

    - name: Verify deploy user can write to the Ansible remote tmp path
      become: false
      ansible.builtin.raw: |
        set -e
        id
        touch {{ ansible_remote_tmp }}/.ansible-write-test
        ls -ld {{ ansible_remote_tmp }} {{ ansible_remote_tmp }}/.ansible-write-test
        rm -f {{ ansible_remote_tmp }}/.ansible-write-test
      register: ansible_remote_tmp_probe
      changed_when: false

    - name: Print deploy-user Ansible remote tmp probe
      ansible.builtin.debug:
        var: ansible_remote_tmp_probe.stdout_lines

    - name: Gather facts after SSH subsystem normalization
      ansible.builtin.setup:
  # Keep reusable hardening roles upstream; add role names here when Rocky 9 roles land there.
  roles: []
