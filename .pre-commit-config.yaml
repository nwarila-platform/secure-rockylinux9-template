# ============================================================================================= #
# Pre-Commit Configuration                                                                     #
# Documentation: https://pre-commit.com                                                        #
# ============================================================================================= #

minimum_pre_commit_version: "4.5.1"

default_stages: [pre-commit, pre-push]

repos:
  # --- [ General File Quality ] ------------------------------------------------------------- #
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-json
        exclude: '^\.vscode/.*\.json$'
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: '^CODE_OF_CONDUCT\.md$'
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  # --- [ Secret Detection ] ----------------------------------------------------------------- #
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # --- [ Packer Formatting ] ---------------------------------------------------------------- #
  - repo: local
    hooks:
      - id: packer-fmt
        name: Packer Format Check
        entry: packer fmt -check -diff
        language: system
        files: '\.pkr\.hcl$|\.pkrvars\.hcl$|\.pkrtpl\.hcl$'
        pass_filenames: false
        args: ["packer"]

  # --- [ YAML Linting ] -------------------------------------------------------------------- #
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .config/.yamllint.yaml]

  # --- [ Markdown Linting ] ----------------------------------------------------------------- #
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .config/.markdownlint.json]
        files: '^(README\.md|CONTRIBUTING\.md|SECURITY\.md)$'

  # --- [ Conventional Commits ] ------------------------------------------------------------- #
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - ci
          - docs
          - refactor
          - test
          - chore
          - security
